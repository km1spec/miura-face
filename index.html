<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pop Image Loop</title>
  <style>
    :root {
      --bg: #050505;
      --image-url: url("./IMG_3063.JPG");
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    body {
      min-height: 100dvh;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background:
        linear-gradient(rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.28)),
        var(--image-url) center / cover no-repeat;
    }

    .stage.rainbow-flash::before {
      content: "";
      position: absolute;
      inset: -10%;
      z-index: 2;
      background:
        radial-gradient(circle at 50% 14%, rgba(255, 255, 255, 0.95) 0 3%, rgba(255, 255, 255, 0.55) 5%, rgba(255, 255, 255, 0) 12%),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0) 28%),
        repeating-conic-gradient(
          from -100deg at 50% 6%,
          rgba(255, 0, 90, 0.24) 0deg 4deg,
          rgba(255, 120, 0, 0.26) 4deg 8deg,
          rgba(255, 235, 0, 0.22) 8deg 12deg,
          rgba(0, 255, 140, 0.22) 12deg 16deg,
          rgba(0, 220, 255, 0.24) 16deg 20deg,
          rgba(0, 90, 255, 0.22) 20deg 24deg,
          rgba(150, 0, 255, 0.24) 24deg 28deg,
          rgba(255, 0, 170, 0.22) 28deg 32deg
        );
      mix-blend-mode: screen;
      filter: blur(14px) saturate(2.25) contrast(1.28);
      opacity: 1;
      transform-origin: 50% 18%;
      animation: rainGlow 1.8s ease-in-out infinite, rainbowPulse 0.6s ease-in-out infinite;
      pointer-events: none;
    }

    .stage.rainbow-flash::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      background:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0) 22%),
        repeating-conic-gradient(
          from -95deg at 50% 6%,
          rgba(255, 255, 255, 0.34) 0deg 1deg,
          rgba(255, 255, 255, 0.04) 1deg 2.2deg,
          rgba(255, 0, 102, 0.2) 2.2deg 3.1deg,
          rgba(255, 196, 0, 0.18) 3.1deg 4deg,
          rgba(0, 255, 170, 0.18) 4deg 4.9deg,
          rgba(0, 136, 255, 0.18) 4.9deg 5.8deg,
          rgba(183, 0, 255, 0.18) 5.8deg 6.7deg,
          rgba(255, 255, 255, 0.04) 6.7deg 7.6deg
        );
      mix-blend-mode: color-dodge;
      animation: rainbowFlicker 0.09s steps(2, end) infinite, beamFall 0.9s linear infinite;
      pointer-events: none;
    }

    .pop-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .pop {
      position: absolute;
      width: var(--size);
      aspect-ratio: 3 / 5;
      object-fit: cover;
      border-radius: 0;
      border: none;
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.38);
      left: var(--x);
      top: var(--y);
      transform: translate(0, 0) scale(0.25);
      opacity: 0;
      animation: popStack 0.7s cubic-bezier(0.2, 0.75, 0.15, 1) forwards;
    }

    @keyframes popStack {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(0.25);
      }
      20% {
        opacity: 1;
      }
      70% {
        opacity: 1;
        transform: translate(0, 0) scale(1.05);
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
    }

    @keyframes rainbowPulse {
      0%, 100% {
        opacity: 0.58;
      }
      50% {
        opacity: 1;
      }
    }

    @keyframes rainGlow {
      0% {
        opacity: 0.45;
        transform: scaleY(0.88);
      }
      50% {
        opacity: 0.95;
        transform: scaleY(1);
      }
      100% {
        opacity: 0.58;
        transform: scaleY(1.14);
      }
    }

    @keyframes rainbowFlicker {
      0% {
        opacity: 0.18;
      }
      100% {
        opacity: 0.9;
      }
    }

    @keyframes beamFall {
      0% {
        transform: translateY(-8%) scaleY(0.9);
        opacity: 0.34;
      }
      50% {
        transform: translateY(2%) scaleY(1.06);
        opacity: 0.92;
      }
      100% {
        transform: translateY(10%) scaleY(1.18);
        opacity: 0.22;
      }
    }

  </style>
</head>
<body>
  <main class="stage">
    <section class="pop-layer" id="popLayer" aria-hidden="true"></section>
  </main>

  <script>
    const imageSrc = "./IMG_3063.JPG";
    const stage = document.querySelector(".stage");
    const popLayer = document.getElementById("popLayer");
    const runTimeMs = 60000;
    const popIntervalMs = 45;
    const startedAt = Date.now();
    let popIndex = 0;
    let finished = false;
    let pendingFinish = false;

    function buildSpiralPositions(cellWidth, cellHeight) {
      const columns = Math.max(1, Math.ceil((window.innerWidth - cellWidth) / cellWidth) + 1);
      const rows = Math.max(1, Math.ceil((window.innerHeight - cellHeight) / cellHeight) + 1);
      const positions = [];
      let left = 0;
      let right = columns - 1;
      let top = 0;
      let bottom = rows - 1;

      while (left <= right && top <= bottom) {
        for (let col = left; col <= right; col += 1) {
          positions.push({ col, row: top });
        }
        top += 1;

        for (let row = top; row <= bottom; row += 1) {
          positions.push({ col: right, row });
        }
        right -= 1;

        if (top <= bottom) {
          for (let col = right; col >= left; col -= 1) {
            positions.push({ col, row: bottom });
          }
          bottom -= 1;
        }

        if (left <= right) {
          for (let row = bottom; row >= top; row -= 1) {
            positions.push({ col: left, row });
          }
          left += 1;
        }
      }

      return positions;
    }

    const size = 96;
    const stepX = 34;
    const stepY = 54;
    let spiralPositions = buildSpiralPositions(stepX, stepY);

    function createPop() {
      const pop = document.createElement("img");
      const current = spiralPositions[popIndex % spiralPositions.length];
      const jitterX = (popIndex % 2) * 6;
      const jitterY = (popIndex % 3) * 4;
      const x = current.col * stepX + jitterX;
      const y = current.row * stepY + jitterY;

      pop.className = "pop";
      pop.src = imageSrc;
      pop.alt = "";
      pop.style.setProperty("--size", `${size}px`);
      pop.style.setProperty("--x", `${x}px`);
      pop.style.setProperty("--y", `${y}px`);

      popLayer.appendChild(pop);
      popIndex += 1;
    }

    function finishSequence() {
      if (finished || pendingFinish) {
        return;
      }

      pendingFinish = true;
      setTimeout(() => {
        finished = true;
        popLayer.innerHTML = "";
        stage.classList.add("rainbow-flash");
      }, 500);
    }

    window.addEventListener("resize", () => {
      spiralPositions = buildSpiralPositions(stepX, stepY);
    });

    const intervalId = setInterval(() => {
      const elapsed = Date.now() - startedAt;

      if (elapsed >= runTimeMs) {
        clearInterval(intervalId);
        finishSequence();
        return;
      }

      if (popIndex >= spiralPositions.length) {
        clearInterval(intervalId);
        finishSequence();
        return;
      }

      createPop();
    }, popIntervalMs);

    const timerId = setInterval(updateTimer, 250);

    for (let i = 0; i < 4; i += 1) {
      setTimeout(createPop, i * 140);
    }
  </script>
</body>
</html>
